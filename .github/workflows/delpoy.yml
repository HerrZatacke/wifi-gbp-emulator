name: Build 🧱 and Deploy 🛳

on:
  push:
    branches: [ develop ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 💳
        uses: actions/checkout@v4.1.7

      - name: Setup node 💻
        uses: actions/setup-node@v4.0.1
        with:
          node-version: '20.x'

      - name: Add release version to environment variables 🌍
        run: |
          cd frontend
          node -e "console.log('RELEASE_VERSION=' + require('./package.json').version)" >> $GITHUB_ENV

      - name: Check if tag already exists 🏷
        id: checkTag
        uses: mukunku/tag-exists-action@v1.6.0
        with:
          tag: ${{ env.RELEASE_VERSION }}

      - name: Install npm dependencies 🔗
        if: steps.checkTag.outputs.exists == 'false'
        run: |
          npm cache clear -f
          npm install

      - name: Build for release zip 🗄
        if: steps.checkTag.outputs.exists == 'false'
        env:
          SPIFFS_TARGET_FOLDER: "../fs-esp"
        run: npm run build

      - name: Create data_w.zip for release 🗄
        if: steps.checkTag.outputs.exists == 'false'
        run: |
          cd ../fs-esp
          zip -r ../data_w.zip *
          cd ..

      - name: Create Release 🎉 🥳
        uses: softprops/action-gh-release@v2.0.5
        if: steps.checkTag.outputs.exists == 'false'
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Version ${{ env.RELEASE_VERSION }}
          files: data_w.zip
